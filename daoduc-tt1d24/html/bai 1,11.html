<!DOCTYPE html>
<html>
	<head>
	<title>Phiếu thăm dò</title>
	</head>

<body>

	<div style="width:700px; margin:60px auto; border:2px solid black; padding:30px;">

	<h2 align="center">PHIẾU THĂM DÒ VÀ GÓP Ý</h2>

<form>

	<table cellpadding="10">

	<tr>
	<td>Họ và tên:</td>
	<td>
	<input type="text" style="width:400px;">
	</td>
	</tr>

	<tr>
	<td>Giới tính:</td>
	<td>
	<input type="radio" name="gt" checked> Nam
	&nbsp;&nbsp;&nbsp;
	<input type="radio" name="gt"> Nữ
	</td>
	</tr>

	<tr>
	<td>Sở thích:</td>
	<td>
	<input type="checkbox"> Tin tức <br>
	<input type="checkbox"> Giải trí <br>
	<input type="checkbox"> Thể thao <br>
	<input type="checkbox"> Du lịch
	</td>
	</tr>

	<tr>	
	<td valign="top">Nội dung góp ý:</td>
	<td>
	<textarea rows="6" cols="50"></textarea>
	</td>
	</tr>

	<tr>
	<td></td>
	<td>
	<input type="submit" value="Gửi đi">
	<input type="reset" value="Nhập lại">
	</td>
	</tr>

</table>

</form>

</div>

</body>
</html>
